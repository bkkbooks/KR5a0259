body:
  text: 真人沐浴東井圖上部第一真氣天河灌東井石景水母精圓光拂靈曜玄暉瑩高明元始披重夜天人逐月生沐浴蘭池上龍負長綆瓶金童灑香華玉女流五星冠帶濯玉津鍊度五仙形體香萬神降乘景登高清神仙五嶽真形圖上部第二真氣妙哉元始道五靈敷真文上開龍漢劫焕爛三景分十部飛天書安鎮五帝神靈嶽承玄宫鬱勃吐寶雲上有不死氣殖牙練五仙玉芝玄中與體潔自生薰精思高靈降交遊上帝君通靈决精八史圖上部第三真氣三景吐靈華晃朗八門開中有智慧神被服飛天衣八史通靈氣玉符洞精微寶雲映玉字巨獸振天威焕爛八會宫紛紛靈人飛精思招真氣五符生光輝八景策玉輿登空入紫微神仙六甲通靈圖上部第四真氣靈宫飛天女六真宴常陽抱日負明月仰躡三晨光通靈究幽微洞觀朗十方招致自然厨五芝六府昌變化練萬神分形改正容乘虛步玄都高奔入空同時降金霄人解襟三素房携契策飛蓋逍遙升玉京神仙九宫紫房圖上部第五真氣紫房映高清宫室互相扶沓煙繞日月飛天翳太虛至真大聖衆蕭條詠羽書開度諸天劫恆沙始一周九五固靈運長保天地居精思安能遠紫宫生我軀元始太清圖上部第六真氣太清無邊際青氣鬱紫微靈風迅士寶琳樹何萋萋紫鳳鳴長條龍驎交橫馳太上觀十方諸天整法衣遊行繞宫城三周長夜開若能思靈氣自得乘景飛神仙真道混成圖上部第七真氣蕩蕩元始初混沌氣未分三色無中化回合若慶雲幽冥生真景焕落敷靈文豁朗開長夜植立天地根自然妙真氣淳淳氣長存運通大九界開度諸天門神仙西升保録圖上部第八真氣乘運迅靈氣駕景升西宫之造玉那國萬乘來相從神魔稽首伏天王並歸降分金範正法世恭道德王故施正真氣别號度一方是時有道世稱曰福德堂靈寶神仙圖曰上部八真神圖以洞天元始之氣化生自然八景上真在人身中致上元生氣精心內思八真見形千乘萬騎運致景雲載人上升第一景腦神名覺元字子道都色白一景玉符上元洞天氣部一景神第二景髮神名玄天華字道衡色玄二景玉符上元洞天氣部二景神第三景皮膚神名通衆仲字道連色黃三景玉符上元洞天氣部三景神第四景目神名靈鑑生字道童五色四景玉符上元洞天氣部四景神第五景頂髓神名靈謨益字道周色白五景玉符上元洞天氣部五景神第六景神名益歷轉字道柱白玉色六景玉符上元洞天氣部六景神第七景鼻神名沖龍玉字道微青白黃三色七景玉符上元洞天氣部七景神第八景舌神名始梁﨑寂字道色𡵨赤八景玉符上元洞天氣部八景神神仙圖曰八景神真玉符上元洞天自然之氣以部上元八景鎮在人身上元宫中服之八年八景見形為己通達幽微之事洞觀自然坐在立亡降致天仙千乘萬騎雲輿羽蓋白日登晨神仙通微靈化圖中部第一真氣大道妙無像運氣凝高真結空自然生靈化表三神朝引五星精中吸日中津夕餐黃月華寢卧練五仙變景隨空化倏欻立自然神仙躡虛九天圖中部第二真氣蕭蕭九天氣清澄自高玄慶雲翳重虛金闕承紫煙中有太極宫道君羅大千青林彌衆梵十方並飛天南陵福德堂四座皆清賔散華慶我願逍遙無波津神仙九變圖中部第三真氣妙化因空感專思通至靈上食九天氣導引五雲精三日練萬神一日變九形脫身遊九域遨戲三界庭乘景望太素靈風回緑軿飛煙繞十絶黃幡召萬靈諸天降羽儀鬱鬱入上清神仙常存圖中部第四真氣點念招幽真專靜神自歸漏盡外應消正氣自夷微積感妙真降六府生光輝玄會空相和萬神應響齊八景扶雲蓋焕落迅羽儀載我大梵外逍遙乘空飛神仙守一養身圖中部第五真氣導引九天氣摩手慰身形遏斷邪魔徑瑩飭練光明鳳翔通真氣龍超制萬靈辰旦衆真會養身覺神生淡泊還守一靜思正氣停神備景自飛高升入上清神仙守神含景圖中部第六真氣泥丸置營魄中元抱一宫丹田三靈府混合生神王三闕統九天呼吸日月光五星奧玄滋流演六胄充靜思萬氣歸神安形亦芳三部八景真携我入太空長居天地劫元始永無終神仙寂默養精守志圖中部第七真氣清朝餐五星專思泥丸神正中咽日光默念絳府薰黃昏導月精灌溉丹田君三真生一景變化形自分一見萬神歸攝氣景高奔上登日月宫出入觀八門龍漢無終劫妙哉靈寶文芝英玉女圖中部第八真氣飄飄散靈氣芝英隨風回諸天灑香華日月灌靈暉玉女擊金盤粲粲乘空飛仰思真顔降咽芝五神開導引光明徹萬劫體不衰靈寶神仙圖曰中部八真神圖以元始靈寶洞玄之氣化生自然中部八景在人身中中元宫中致中元生氣精思八年八真見景千乘萬騎運致神仙羽蓋飛行太空神仙圖曰靈寶洞玄中元八景真符以部中部八景神真鎮在人身中元宫中服之八年中元八景見形為己通靈達神洞觀八方神芝玉漿五氣雲芽身生光明神仙乘騎飛行太空神仙六陰玉女圖下部第一真氣靈妃秀太微玉女翠朱瓊窈窕飛空出飄飄乘虛生玄妙自然氣六陰安常形遐念希良會仰眄降六丁携景金房內嬿婉娉精情玄感自來求豈期形與名變化因凝發應響神自靈神仙九元導仙圖下部第二真氣王清耀玄都十聖回紫微神仙披雲出紛紛流羽衣香華隨風散十天乘空飛丹霄映輕蓋日月灌靈暉仰思妙真降神感因心歸神仙導引圖下部第三真氣鬱鬱五雲芝玄暉吐玉光凝津洞靈府徘徊日月宫五色理高真流精灌十方呼吸不覺疲飛天並金容導引餐靈氣玄哺六胄充精思易致感安坐覩空同神仙洞中洪保圖下部第四真氣餐氣理太玄蕭蕭群真居下治諸名山洞房清且虛五色焕日月列號衆仙儲上統紫微宫總録天寶書中有守一士精思待開圖五老監魔試心