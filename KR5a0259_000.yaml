front:
  text: 太玄八景籙果六上皇元年九月二日後聖李君出遊西河歷觀八方值元始天王乘八景玉輿駕九色玄龍三素飛雲導從群仙手把華幡獅子白鶴嘯歌雍雍浮空而來同會西河之上李君稽首請問天王昔蒙訓授天書玉字二十四圖雖得其文未究妙章雖有圖讚而無其像修之菴靄妙理難詳今遇天尊喜慶難言願垂成就極其道真於是使清齊千日五香薰體東向服符子形神備見自當洞達諸疑頓了李君稽首奉承教㫖具依天儀長齊千日東向服符三部八景神並見身中金書玉字二十四圖空中而明文綵光鮮洞徹無窮羅縷自然是時即命主圖上仙而畫圖焉金書紫字玉文丹章於此成音自南極上元九光太真王夫人東西二華南北真公五嶽神仙清虛真人所受真文並是後聖所畫圖像而各係之焉
