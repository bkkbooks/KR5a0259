body:
  text: 眞人沐浴東井圖上部第一眞氣天河灌東井石景水母精圓光拂靈曜玄暉瑩高明元始披重夜天人逐月生沐浴蘭池上龍負長綆缾金童灑香華玉女流五星冠帶濯玉津鍊度五僊形體香萬神降乗景登高清神僊五嶽眞形圖上部第二眞氣妙哉元始道五靈敷眞文上開龍漢劫焕爛三景分十部飛天書安鎮五帝神靈嶽承玄宫鬱勃吐寳雲上有不死氣殖牙練五僊玉芝玄中與體潔自生薰精思高靈降交遊上帝君通靈决精八史圖上部第三眞氣三景吐靈華晃朗八門開中有智慧神被服飛天衣八史通靈氣玉符洞精微寳雲映玉字巨獸振天威焕爛八會宫紛紛靈人飛精思招眞氣五符生光輝八景策玉轝登空入紫微神僊六甲通靈圖上部第四眞氣靈宫飛天女六眞宴常陽抱日負明月仰躡三晨光通靈究幽微洞觀朗十方招致自然厨五芝六府昌變化練萬神分形改正容乗虚步玄都高奔入空同時降金霄人解衿三素房携契策飛蓋逍遥昇玉京神僊九宫紫房圖上部第五眞氣紫房映高清宫室互相扶沓煙繞日月飛天翳太虚至眞大聖衆蕭條詠羽書開度諸天劫恒沙始一周九五固靈運長保天地居精思安能遠紫宫生我軀元始太清圖上部第六眞氣太清无邊際青氣鬱紫微靈風迅士寳琳樹何萋萋紫鳳鳴長條龍驎交横馳太上觀十方諸天整法衣遊行繞宫城三周長夜開若能思靈氣自得乗景飛神僊眞道混成圖上部第七眞氣蕩蕩元始初混沌氣未分三色无中化迴合若慶雲幽㝠生眞景焕落敷靈文豁朗開長夜植立天地根自然妙眞氣淳淳氣長存運通大九界開度諸天門神僊西昇保録圖上部第八眞氣乗運迅靈氣駕景昇西宫之造玉那國萬乗來相從神魔稽首伏天王並歸降分金範正法世恭道德王故施正眞氣别號度一方是時有道世稱曰福德堂靈寳神僊圖曰上部八眞神圖以洞天元始之氣化生自然八景上眞在人身中致上元生氣精心内思八眞見形千乗萬騎運致景雲載人上昇第一景腦神名覺元字子道都色白一景玉符上元洞天氣部一景神第二景髮神名玄天華字道衡色玄二景玉符上元洞天氣部二景神第三景皮膚神名通衆仲字道連色黃三景玉符上元洞天氣部三景神第四景目神名靈鑑生字道童五色四景玉符上元洞天氣部四景神第五景頂髓神名靈謨益字道周色白五景玉符上元洞天氣部五景神第六景神名益歷轉字道柱白玉色六景玉符上元洞天氣部六景神第七景鼻神名沖龍玉字道微青白黄三色七景玉符上元洞天氣部七景神第八景舌神名始梁﨑寂字道色𡵨赤八景玉符上元洞天氣部八景神神僊圖曰八景神眞玉符上元洞天自然之氣以部上元八景鎮在人身上元宫中服之八年八景見形爲己通達幽微之事洞觀自然坐在立亡降致天僊千乗萬騎雲轝羽蓋白日登晨神僊通微靈化圖中部第一眞氣大道妙無像運氣凝高眞結空自然生靈化表三神朝引五星精中噏日中津夕餐黄月華寢卧練五僊變景隨空化儵欻立自然神僊躡虚九天圖中部第二眞氣蕭蕭九天氣清澄自高玄慶雲翳重虚金闕承紫煙中有太極宫道君羅大千青林彌衆梵十方並飛天南陵福德堂四座皆清賔散華慶我願逍遥无波津神僊九變圖中部第三眞氣妙化因空感專思通至靈上食九天氣導引五雲精三日練萬神一日變九形脱身遊九域遨戲三界庭乗景望太素靈風迴緑軿飛煙繞十絶黄旛召萬靈諸天降羽儀鬱鬱入上清神僊常存圖中部第四眞氣點念招幽眞專靜神自歸漏盡外應消正氣自夷微積感妙眞降六府生光輝玄會空相和萬神應響齊八景扶雲蓋焕落迅羽儀載我大梵外逍遥乗空飛神僊守一養身圖中部第五眞氣導引九天氣摩手慰身形遏斷邪魔逕瑩飭練光明鳳翔通眞氣龍超制萬靈辰旦衆眞會養身覺神生淡泊還守一靜思正氣停神備景自飛高升入上清神僊守神含景圖中部第六眞氣泥丸置營魄中元抱一宫丹田三靈府混合生神王三闕統九天呼吸日月光五星奥玄滋流演六冑充靜思萬氣歸神安形亦芳三部八景眞携我入太空長居天地劫元始永无終神僊寂默養精守志圖中部第七眞氣清朝餐五星專思泥丸神正中咽日光默念絳府薰黄昏導月精灌溉丹田君三眞生一景變化形自分一見萬神歸攝氣景高奔上登日月宫岀入觀八門龍漢无終劫妙哉靈寳文芝英玉女圖中部第八眞氣飄飄散靈氣芝英隨風迴諸天灑香華日月灌靈暉玉女擊金盤粲粲乗空飛仰思眞顔降咽芝五神開導引光明徹萬劫體不衰靈寳神僊圖曰中部八眞神圖以元始靈寳洞玄之氣化生自然中部八景在人身中中元宫中致中元生氣精思八年八眞見景千乗萬騎運致神僊羽蓋飛行太空神僊圖曰靈寳洞玄中元八景眞符以部中部八景神眞鎮在人身中元宫中服之八年中元八景見形爲己通靈達神洞觀八方神芝玉漿五氣雲芽身生光明神僊乗騎飛行太空神僊六陰玉女圖下部第一眞氣靈妃秀太微玉女翠朱瓊窈窕飛空出飄飄乗虚生玄妙自然氣六陰安常形遐念希良會仰眄降六丁携景金房内嬿婉娉精情玄感自來求豈期形與名變化因凝發應響神自靈神僊九元導僊圖下部第二眞氣王清耀玄都十聖迴紫微神僊披雲出紛紛流羽衣香華隨風散十天乗空飛丹霄映輕蓋日月灌靈暉仰思妙眞降神感因心歸神僊導引圖下部第三眞氣鬱鬱五雲芝玄暉吐玉光凝津洞靈府徘徊日月宫五色理高眞流精灌十方呼吸不覺疲飛天並金容導引餐靈氣玄哺六冑充精思易致感安坐覩空同神僊洞中洪保圖下部第四眞氣餐氣理太玄蕭蕭群眞居下治諸名山洞房清且虚五色焕日月列號衆僊儲上統紫微宫總録天寳書中有守一士精思待開圖五老監魔試心